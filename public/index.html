<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aito Business CRM</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body class="layout-public">
    <div class="app-shell">
      <aside class="sidebar" hidden>
        <div>
          <div class="brand">
            <span class="brand-mark">A</span>
            <div>
              <strong>Aito Business</strong>
              <p>CRM commerciale e partnership</p>
            </div>
          </div>

          <nav class="nav">
            <a href="/dashboard" data-link data-nav="dashboard">
              <span class="nav-label">Dashboard</span>
              <span class="nav-badge" data-nav-badge="dashboard">0</span>
            </a>
            <a href="/contatti" data-link data-nav="contacts">
              <span class="nav-label">Contatti</span>
              <span class="nav-badge" data-nav-badge="contacts">0</span>
            </a>
            <a href="/pipeline" data-link data-nav="pipeline">
              <span class="nav-label">Pipeline</span>
              <span class="nav-badge" data-nav-badge="pipeline">0</span>
            </a>
            <a href="/offerte" data-link data-nav="offers">
              <span class="nav-label">Offerte</span>
              <span class="nav-badge" data-nav-badge="offers">0</span>
            </a>
            <a href="/analytics" data-link data-nav="analytics">
              <span class="nav-label">Analytics</span>
              <span class="nav-badge" data-nav-badge="analytics">0</span>
            </a>
            <a href="/suggerimenti-ai" data-link data-nav="suggestions">
              <span class="nav-label">Suggerimenti AI</span>
              <span class="nav-badge" data-nav-badge="suggestions">0</span>
            </a>
            <a href="/importa-linkedin" data-link data-nav="upload">
              <span class="nav-label">Importa LinkedIn</span>
              <span class="nav-badge" data-nav-badge="upload">0</span>
            </a>
          </nav>
        </div>

        <div class="sidebar-stack">
          <div class="sidebar-card sidebar-card-strong">
            <span class="eyebrow">Focus</span>
            <strong id="sidebar-focus">Costruisci la tua pipeline.</strong>
            <p class="subtle" id="sidebar-summary">Importa i contatti LinkedIn per iniziare.</p>
            <div id="sidebar-session"></div>
          </div>
          <div class="sidebar-card">
            <span class="eyebrow">Workflow</span>
            <strong>Importa, classifica, proponi, chiudi.</strong>
          </div>
        </div>
      </aside>

      <main class="main-content" id="main-content"></main>

      <aside class="assistant-panel" id="assistant-panel" hidden></aside>
    </div>

    <script src="/public/app.js"></script>
  </body>
  </html>
